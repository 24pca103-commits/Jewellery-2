<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Thodoo Jewellery - Premium South Indian Gold, Diamond & Silver Jewellery. BIS Hallmarked. Shop our exclusive bridal, temple & contemporary collections." />
    <meta name="keywords" content="Gold Jewellery, Diamond Jewellery, South Indian Jewellery, Bridal Jewellery, Silver Jewellery, BIS Hallmarked, Thodoo Jewellery" />
    <meta name="author" content="Thodoo Jewellery" />
    <meta property="og:title" content="Thodoo Jewellery | Elegance in Every Element" />
    <meta property="og:description" content="Discover our timeless Gold, Silver, and Diamond collections. BIS Hallmarked. Free Shipping across India." />
    <meta property="og:type" content="website" />
    <title>Thodoo Jewellery | Gold, Diamond & Silver Collections</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;500;600;700;800&family=Karla:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #fff9f2; }
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #3B1A0A;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      .preloader-logo {
        font-family: 'Vollkorn', serif;
        font-size: 42px;
        font-weight: 700;
        color: #C5A257;
        letter-spacing: 8px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .preloader-sub {
        font-family: 'Karla', sans-serif;
        font-size: 11px;
        color: rgba(197,162,87,0.6);
        letter-spacing: 5px;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      .preloader-bar {
        width: 120px;
        height: 2px;
        background: rgba(197,162,87,0.2);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .preloader-fill {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #C5A257, #e8c97a);
        border-radius: 2px;
        animation: fillBar 1.5s ease forwards;
      }
      @keyframes fillBar {
        0% { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="preloader-logo">Thodoo</div>
      <div class="preloader-sub">Jewellery</div>
      <div class="preloader-bar">
        <div class="preloader-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
