<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Delicate gold chain links -->
  <path d="M 15 35 Q 60 95 105 35" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 3" />
  <path d="M 15 35 Q 60 95 105 35" fill="none" stroke="#bca057" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Pendant loop/connector -->
  <circle cx="60" cy="80" r="3.5" fill="#dfba6b" stroke="#d4af37" stroke-width="1" />
  
  <!-- Diamond gemstone cut shape -->
  <polygon points="60,82 50,96 60,108 70,96" fill="#e5f5ff" stroke="#d4af37" stroke-width="1.5" />
  
  <!-- Facet highlight lines -->
  <line x1="60" y1="82" x2="60" y2="108" stroke="#ffffff" stroke-width="1" />
  <line x1="50" y1="96" x2="70" y2="96" stroke="#ffffff" stroke-width="0.8" />
  
  <!-- Sparkling stars / sparkles -->
  <path d="M 45 70 Q 45 75 40 75 Q 45 75 45 80 Q 45 75 50 75 Q 45 75 45 70 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 75 85 Q 75 90 70 90 Q 75 90 75 95 Q 75 90 80 90 Q 75 90 75 85 Z" fill="#dfba6b" opacity="0.8" />
</svg>
